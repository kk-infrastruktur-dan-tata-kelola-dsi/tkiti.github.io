name: Deploy Backend to Self-hosted Server

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to deployment directory
        run: |
          mkdir -p /www/wwwroot/tkiti-web-profile/backend
          rsync -av --delete \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='.env' \
            --no-perms --no-owner --no-group --no-times \
            backend/ /www/wwwroot/tkiti-web-profile/backend/

      - name: Retry rsync without delete
        if: failure()
        run: |
          rsync -av \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='.env' \
            --no-perms --no-owner --no-group --no-times \
            backend/ /www/wwwroot/tkiti-web-profile/backend/

      - name: Fix permissions
        run: |
          find /www/wwwroot/tkiti-web-profile/backend \
            -path /www/wwwroot/tkiti-web-profile/backend/data -prune -o \
            -path /www/wwwroot/tkiti-web-profile/backend/uploads -prune -o \
            -name .env -prune -o \
            -type d -exec chmod 755 {} +
          find /www/wwwroot/tkiti-web-profile/backend \
            -path /www/wwwroot/tkiti-web-profile/backend/data -prune -o \
            -path /www/wwwroot/tkiti-web-profile/backend/uploads -prune -o \
            -name .env -prune -o \
            -type f -exec chmod 644 {} +

      - name: Validate backend env file
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: |
          if [ ! -f .env ]; then
            echo "ERROR: /www/wwwroot/tkiti-web-profile/backend/.env tidak ditemukan."
            echo "Buat file .env dari .env.example lalu isi JWT_SECRET, NODE_ENV, FRONTEND_URL, PORT."
            exit 1
          fi
          if ! grep -q '^JWT_SECRET=' .env || [ -z "$(grep '^JWT_SECRET=' .env | cut -d'=' -f2-)" ]; then
            echo "ERROR: JWT_SECRET belum diisi di .env"
            exit 1
          fi

      - name: Build Docker image
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: docker compose build --no-cache

      - name: Stop previous containers
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: docker compose down --remove-orphans || true

      - name: Force remove containers using port 5000
        run: |
          CONTAINERS=$(docker ps -q --filter "publish=5000")
          if [ -n "$CONTAINERS" ]; then
            echo "Removing containers that publish host port 5000: $CONTAINERS"
            docker rm -f $CONTAINERS
          else
            echo "No container publishing host port 5000."
          fi

      - name: Check port 5000 availability
        run: |
          if ss -ltn '( sport = :5000 )' | grep -q ':5000'; then
            echo "ERROR: Port 5000 masih dipakai proses lain."
            ss -ltnp '( sport = :5000 )' || true
            exit 1
          fi

      - name: Start containers
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: docker compose up -d

      - name: Seed admin user (first deploy only)
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        env:
          SEED_USERNAME: admin
          SEED_PASSWORD: admin123
          SEED_OVERWRITE: "false"
        run: |
          if [ ! -f ./data/.admin-seeded ]; then
            echo "First deploy detected. Running admin seed..."
            docker compose exec -T api node dist/seed.js
            mkdir -p ./data
            touch ./data/.admin-seeded
          else
            echo "Admin seed already executed. Skipping."
          fi

      - name: Clean up old Docker images
        run: docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for container to start..."
          sleep 10
          for i in 1 2 3; do
            if curl -f http://localhost:5000/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          docker compose logs api
          exit 1
