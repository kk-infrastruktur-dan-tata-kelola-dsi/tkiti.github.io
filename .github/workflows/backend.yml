name: Deploy Backend to Self-hosted Server

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to deployment directory
        run: |
          mkdir -p /www/wwwroot/tkiti-web-profile/backend
          rsync -av --delete \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='.env' \
            --no-perms --no-owner --no-group --no-times \
            backend/ /www/wwwroot/tkiti-web-profile/backend/

      - name: Retry rsync without delete
        if: failure()
        run: |
          rsync -av \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='.env' \
            --no-perms --no-owner --no-group --no-times \
            backend/ /www/wwwroot/tkiti-web-profile/backend/

      - name: Fix permissions
        run: |
          chmod -R 755 /www/wwwroot/tkiti-web-profile/backend
          chown -R tkiti:tkiti /www/wwwroot/tkiti-web-profile/backend 2>/dev/null || true

      - name: Build Docker image
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: docker compose build --no-cache

      - name: Restart containers
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        run: docker compose up -d --remove-orphans

      - name: Seed admin user (first deploy only)
        working-directory: /www/wwwroot/tkiti-web-profile/backend
        env:
          SEED_USERNAME: admin
          SEED_PASSWORD: admin123
          SEED_OVERWRITE: "false"
        run: |
          if [ ! -f ./data/.admin-seeded ]; then
            echo "First deploy detected. Running admin seed..."
            docker compose exec -T api node dist/seed.js
            mkdir -p ./data
            touch ./data/.admin-seeded
          else
            echo "Admin seed already executed. Skipping."
          fi

      - name: Clean up old Docker images
        run: docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for container to start..."
          sleep 10
          for i in 1 2 3; do
            if curl -f http://localhost:5000/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 3 attempts"
          docker compose logs api
          exit 1
