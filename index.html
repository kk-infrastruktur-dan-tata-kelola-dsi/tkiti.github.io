
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Lab TKITI</title>
      <link rel="icon" type="image/png" href="/images/logo.png" />
      <script>
        var repoSegment = window.location.pathname.split('/')[1];
        if (window.location.hostname.endsWith('github.io') && repoSegment) {
          var baseEl = document.createElement('base');
          baseEl.setAttribute('href', '/' + repoSegment + '/');
          document.head.appendChild(baseEl);
        }

        // Restore path setelah redirect dari 404.html (GitHub Pages SPA routing fix)
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          window.history.replaceState(null, null, redirect);
        }
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
