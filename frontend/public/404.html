<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TKITI</title>
    <script>
      // GitHub Pages SPA routing fix:
      // Simpan path ke sessionStorage lalu redirect ke root.
      // index.html akan restore path via history.replaceState.
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/');
    </script>
  </head>
</html>
